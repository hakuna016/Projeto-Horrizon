services:
  - type: web
    name: projeto-horizon
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: DB_PATH
        value: /data/logistica.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 5
